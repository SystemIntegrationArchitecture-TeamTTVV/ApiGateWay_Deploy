              args:
                name: messageService
                fallbackUri: forward:/fallback/message

        - id: message-service-calls
          uri: ${MESSAGE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/message/calls/**
          filters:
            - StripPrefix=2
            - name: CircuitBreaker
              args:
                name: messageService
                fallbackUri: forward:/fallback/message

        - id: message-service-all
          uri: ${MESSAGE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=2
            - name: CircuitBreaker
              args:
                name: messageService
                fallbackUri: forward:/fallback/message

      httpclient:
        connect-timeout: 2000
        response-timeout: 30s

      # ─── Global CORS ───────────────────────────────────────────────────────
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

server:
  port: 8088

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}

# ⚠️ PRODUCTION: set JWT_SECRET env var — do NOT use the default in production
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}



resilience4j:
  timelimiter:
    instances:
      commonService:
        timeoutDuration: 30s
        cancelRunningFuture: true
      messageService:
        timeoutDuration: 30s
        cancelRunningFuture: true
      authService:
        timeoutDuration: 30s
        cancelRunningFuture: true
  circuitbreaker:
    instances:
      commonService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 95
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 10
        automaticTransitionFromOpenToHalfOpenEnabled: true
      messageService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 95
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 10
        automaticTransitionFromOpenToHalfOpenEnabled: true
      authService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 95
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 10
        automaticTransitionFromOpenToHalfOpenEnabled: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO

# Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /api/auth-svc/v3/api-docs
      - name: Social Service
        url: /api/social/v3/api-docs
      - name: Common Service (Legacy)
        url: /api/common/v3/api-docs
      - name: Message Service
        url: /api/message/v3/api-docs
    urls-primary-name: Auth Service
